# Configuration for `cargo audit`.
# See: https://docs.rs/cargo-audit/latest/cargo_audit/config/index.html

[advisories]
ignore = [
    # RUSTSEC-2026-0097: rand is unsound when a custom global logger calls
    # `rand::rng()` during initialization.
    # https://rustsec.org/advisories/RUSTSEC-2026-0097
    #
    # Not applicable to splitrail:
    #   * We do not depend on `rand` directly and do not install a custom
    #     logger that touches rand APIs.
    #   * Both flagged versions come from feature-gated transitive dependencies
    #     that are never compiled into our binary:
    #       - rand 0.8.5 -> phf_generator 0.11.3 -> phf 0.11.3 -> termwiz ->
    #         ratatui-termwiz (enabled only by ratatui's optional `termwiz`
    #         feature; we use ratatui with default features, so `termwiz` is
    #         off).
    #       - rand 0.9.2 -> quinn-proto -> quinn -> reqwest (enabled only by
    #         reqwest's optional `http3` feature; we use reqwest with
    #         `features = ["rustls", "gzip"]`, so `http3` is off).
    #     `cargo audit` reads Cargo.lock, which unions all optional
    #     dependencies regardless of feature selection, hence the false
    #     positive.
    #
    # Re-evaluate once phf_generator adopts rand >= 0.10 or quinn-proto
    # releases a version using rand >= 0.10.
    "RUSTSEC-2026-0097",
]
